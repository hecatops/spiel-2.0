<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" shape-rendering="crispEdges">
  <!-- ears -->
  <rect x="2" y="1" width="3" height="3" fill="#8FB8FF"/>
  <rect x="11" y="1" width="3" height="3" fill="#8FB8FF"/>
  <rect x="3" y="2" width="1" height="1" fill="#FFD6E8"/>
  <rect x="12" y="2" width="1" height="1" fill="#FFD6E8"/>
  <!-- head -->
  <rect x="2" y="3" width="12" height="8" fill="#B8D4FF"/>
  <!-- cheeks -->
  <rect x="2" y="8" width="2" height="1" fill="#FFD6E8"/>
  <rect x="12" y="8" width="2" height="1" fill="#FFD6E8"/>
  <!-- eyes -->
  <rect x="4" y="6" width="3" height="2" fill="#5D8DE8"/>
  <rect x="9" y="6" width="3" height="2" fill="#5D8DE8"/>
  <rect x="5" y="6" width="1" height="1" fill="#39466B"/>
  <rect x="10" y="6" width="1" height="1" fill="#39466B"/>
  <rect x="6" y="6" width="1" height="1" fill="#fff"/>
  <rect x="11" y="6" width="1" height="1" fill="#fff"/>
  <!-- nose + mouth -->
  <rect x="7" y="9" width="2" height="1" fill="#FF9EC4"/>
  <rect x="6" y="10" width="1" height="1" fill="#FF9EC4"/>
  <rect x="9" y="10" width="1" height="1" fill="#FF9EC4"/>
  <!-- whiskers -->
  <rect x="2" y="9" width="3" height="1" fill="#8FB8FF"/>
  <rect x="11" y="9" width="3" height="1" fill="#8FB8FF"/>
  <!-- body -->
  <rect x="4" y="11" width="8" height="4" fill="#B8D4FF"/>
  <!-- tail -->
  <rect x="13" y="12" width="2" height="4" fill="#8FB8FF"/>
  <rect x="12" y="15" width="2" height="1" fill="#8FB8FF"/>
  <!-- feet -->
  <rect x="4" y="14" width="3" height="2" fill="#8FB8FF"/>
  <rect x="9" y="14" width="3" height="2" fill="#8FB8FF"/>
</svg>
