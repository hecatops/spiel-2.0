<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" shape-rendering="crispEdges">
  <!-- ears -->
  <rect x="1" y="1" width="4" height="4" fill="#FFB88A"/>
  <rect x="11" y="1" width="4" height="4" fill="#FFB88A"/>
  <rect x="2" y="2" width="2" height="2" fill="#FF9EC4"/>
  <rect x="12" y="2" width="2" height="2" fill="#FF9EC4"/>
  <!-- head -->
  <rect x="2" y="4" width="12" height="7" fill="#FFB88A"/>
  <!-- muzzle -->
  <rect x="5" y="8" width="6" height="3" fill="#EEF8FF"/>
  <!-- eyes -->
  <rect x="4" y="6" width="2" height="2" fill="#39466B"/>
  <rect x="10" y="6" width="2" height="2" fill="#39466B"/>
  <rect x="5" y="6" width="1" height="1" fill="#fff"/>
  <rect x="11" y="6" width="1" height="1" fill="#fff"/>
  <!-- nose -->
  <rect x="7" y="9" width="2" height="1" fill="#39466B"/>
  <!-- body -->
  <rect x="4" y="11" width="8" height="3" fill="#FFB88A"/>
  <!-- tail -->
  <rect x="12" y="10" width="3" height="4" fill="#FFB88A"/>
  <rect x="13" y="13" width="2" height="2" fill="#EEF8FF"/>
  <!-- feet -->
  <rect x="4" y="14" width="3" height="2" fill="#FF9980"/>
  <rect x="9" y="14" width="3" height="2" fill="#FF9980"/>
</svg>
