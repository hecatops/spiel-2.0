<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" shape-rendering="crispEdges">
  <!-- floppy ears -->
  <rect x="1" y="3" width="3" height="5" fill="#C99A6B"/>
  <rect x="12" y="3" width="3" height="5" fill="#C99A6B"/>
  <rect x="2" y="4" width="1" height="3" fill="#A87B4F"/>
  <rect x="13" y="4" width="1" height="3" fill="#A87B4F"/>
  <!-- head -->
  <rect x="3" y="3" width="10" height="7" fill="#E8C39E"/>
  <!-- forehead patch -->
  <rect x="6" y="2" width="4" height="2" fill="#E8C39E"/>
  <!-- eyes -->
  <rect x="5" y="6" width="2" height="2" fill="#39466B"/>
  <rect x="9" y="6" width="2" height="2" fill="#39466B"/>
  <rect x="6" y="6" width="1" height="1" fill="#fff"/>
  <rect x="10" y="6" width="1" height="1" fill="#fff"/>
  <!-- snout -->
  <rect x="5" y="9" width="6" height="2" fill="#F5DEC0"/>
  <!-- nose -->
  <rect x="7" y="9" width="2" height="1" fill="#39466B"/>
  <!-- body -->
  <rect x="4" y="11" width="8" height="3" fill="#E8C39E"/>
  <!-- tail -->
  <rect x="12" y="10" width="2" height="2" fill="#E8C39E"/>
  <rect x="13" y="9" width="2" height="2" fill="#E8C39E"/>
  <!-- feet -->
  <rect x="4" y="14" width="3" height="2" fill="#C99A6B"/>
  <rect x="9" y="14" width="3" height="2" fill="#C99A6B"/>
</svg>
