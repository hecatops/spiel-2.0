<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" shape-rendering="crispEdges">
  <!-- head -->
  <rect x="4" y="1" width="8" height="7" fill="#FFE066"/>
  <rect x="3" y="2" width="10" height="5" fill="#FFE066"/>
  <!-- tuft -->
  <rect x="7" y="0" width="2" height="2" fill="#FFD700"/>
  <rect x="6" y="0" width="1" height="1" fill="#FFD700"/>
  <rect x="9" y="0" width="1" height="1" fill="#FFD700"/>
  <!-- eyes -->
  <rect x="5" y="4" width="2" height="2" fill="#39466B"/>
  <rect x="9" y="4" width="2" height="2" fill="#39466B"/>
  <rect x="6" y="4" width="1" height="1" fill="#fff"/>
  <rect x="10" y="4" width="1" height="1" fill="#fff"/>
  <!-- beak -->
  <rect x="7" y="6" width="2" height="2" fill="#FFB88A"/>
  <rect x="6" y="7" width="4" height="1" fill="#FFB88A"/>
  <!-- body -->
  <rect x="3" y="8" width="10" height="6" fill="#FFE066"/>
  <rect x="2" y="9" width="12" height="4" fill="#FFE066"/>
  <!-- wings -->
  <rect x="1" y="9" width="2" height="3" fill="#FFD700"/>
  <rect x="13" y="9" width="2" height="3" fill="#FFD700"/>
  <!-- feet -->
  <rect x="5" y="14" width="2" height="2" fill="#FFB88A"/>
  <rect x="4" y="15" width="1" height="1" fill="#FFB88A"/>
  <rect x="7" y="15" width="1" height="1" fill="#FFB88A"/>
  <rect x="9" y="14" width="2" height="2" fill="#FFB88A"/>
  <rect x="8" y="15" width="1" height="1" fill="#FFB88A"/>
  <rect x="11" y="15" width="1" height="1" fill="#FFB88A"/>
</svg>
