  <rect x="6" y="12" width="4" height="4" fill="#FFD6E8"/>
  <rect x="0" y="6" width="4" height="4" fill="#FFD6E8"/>
  <rect x="12" y="6" width="4" height="4" fill="#FFD6E8"/>
  <!-- diagonal petals -->
